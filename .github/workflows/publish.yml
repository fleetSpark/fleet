name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# Each per-package publish step calls a small shell precheck that compares
# the workspace's local package.json version with the version currently on
# the npm registry. We only run `npm publish` when they differ, so a release
# tag can bump only the packages that changed — unchanged adapters and
# plugins skip cleanly instead of halting the workflow with EPUBLISHCONFLICT.
#
# IMPORTANT: do NOT add `continue-on-error: true` to these steps. Auth
# failures (ENEEDAUTH), build failures, or registry outages must fail loud
# so a broken release does not silently look "successful." The precheck is
# the deliberate skip mechanism; everything else is a real error.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm run test:all

      - name: Publish @fleetspark/core
        run: |
          PKG_DIR=packages/core
          NAME=$(node -p "require('./$PKG_DIR/package.json').name")
          LOCAL=$(node -p "require('./$PKG_DIR/package.json').version")
          REMOTE=$(npm view "$NAME" version 2>/dev/null || echo "")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Skipping $NAME — version $LOCAL already published"
          else
            echo "Publishing $NAME@$LOCAL (remote: ${REMOTE:-none})"
            npm publish --workspace "$PKG_DIR" --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fleetspark/adapter-claude
        run: |
          PKG_DIR=packages/adapters/claude
          NAME=$(node -p "require('./$PKG_DIR/package.json').name")
          LOCAL=$(node -p "require('./$PKG_DIR/package.json').version")
