name: Publish to npm

on:
  push:
    tags:
      - 'v*'

# Each per-package publish step is independent. We use `continue-on-error: true`
# so that publishing a package whose version is unchanged (npm responds with
# EPUBLISHCONFLICT) does not halt subsequent steps. This lets a release tag
# bump only the packages that changed without forcing version bumps on every
# adapter and plugin.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - run: npm run test:all

      - name: Publish @fleetspark/core
        run: npm publish --workspace packages/core --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fleetspark/adapter-claude
        run: npm publish --workspace packages/adapters/claude --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fleetspark/adapter-codex
        run: npm publish --workspace packages/adapters/codex --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fleetspark/adapter-aider
        run: npm publish --workspace packages/adapters/aider --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fleetspark/adapter-opencode
        run: npm publish --workspace packages/adapters/opencode --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @fleetspark/adapter-a2a
        run: npm publish --workspace packages/adapters/a2a --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish fleetspark
        run: npm publish --workspace packages/cli --access public
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
