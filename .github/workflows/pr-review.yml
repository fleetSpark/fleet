name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  auto-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze PR
        id: analyze
        run: |
          # Collect all analysis into a report
          REPORT=""

          # 1. Files changed
          FILES=$(git diff --name-only origin/main...HEAD)
          FILE_COUNT=$(echo "$FILES" | wc -l)
          REPORT+="### ЁЯУБ Files changed: ${FILE_COUNT}\n"

          # 2. Categorize changes
          CORE_CHANGES=$(echo "$FILES" | grep -c 'packages/core/src/' || true)
          CLI_CHANGES=$(echo "$FILES" | grep -c 'packages/cli/' || true)
          ADAPTER_CHANGES=$(echo "$FILES" | grep -c 'packages/adapters/' || true)
          TEST_CHANGES=$(echo "$FILES" | grep -c 'tests/' || true)
          DOC_CHANGES=$(echo "$FILES" | grep -cE '\.md$|website/' || true)

          REPORT+="\n| Area | Files |\n|------|-------|\n"
          [ "$CORE_CHANGES" -gt 0 ] && REPORT+="| Core | ${CORE_CHANGES} |\n"
          [ "$CLI_CHANGES" -gt 0 ] && REPORT+="| CLI | ${CLI_CHANGES} |\n"
          [ "$ADAPTER_CHANGES" -gt 0 ] && REPORT+="| Adapters | ${ADAPTER_CHANGES} |\n"
          [ "$TEST_CHANGES" -gt 0 ] && REPORT+="| Tests | ${TEST_CHANGES} |\n"
          [ "$DOC_CHANGES" -gt 0 ] && REPORT+="| Docs | ${DOC_CHANGES} |\n"

          # 3. Risk assessment
          REPORT+="\n### ЁЯФН Risk assessment\n"

          PROTOCOL_TOUCHED=$(echo "$FILES" | grep -c 'packages/core/src/protocol/' || true)
          STATE_TOUCHED=$(echo "$FILES" | grep -c 'packages/core/src/state/' || true)
          CONFIG_TOUCHED=$(echo "$FILES" | grep -c 'packages/core/src/config/' || true)

          if [ "$PROTOCOL_TOUCHED" -gt 0 ] || [ "$STATE_TOUCHED" -gt 0 ]; then
            REPORT+="- ЁЯФ┤ **HIGH RISK** тАФ Protocol or state machine files modified. Requires careful review.\n"
          elif [ "$CONFIG_TOUCHED" -gt 0 ]; then
            REPORT+="- ЁЯЯб **MEDIUM RISK** тАФ Config schema changed. Check backward compatibility.\n"
          elif [ "$ADAPTER_CHANGES" -gt 0 ] && [ "$CORE_CHANGES" -eq 0 ]; then
            REPORT+="- ЁЯЯв **LOW RISK** тАФ Adapter-only change. Self-contained.\n"
          elif [ "$DOC_CHANGES" -gt 0 ] && [ "$CORE_CHANGES" -eq 0 ] && [ "$CLI_CHANGES" -eq 0 ]; then
            REPORT+="- ЁЯЯв **LOW RISK** тАФ Documentation only.\n"
          else
            REPORT+="- ЁЯЯб **MEDIUM RISK** тАФ Review for correctness and test coverage.\n"
          fi

          # 4. Test coverage check
          SRC_CHANGED=$(echo "$FILES" | grep -cE 'packages/.*/src/.*\.tsx?$' || true)
          TESTS_CHANGED=$(echo "$FILES" | grep -c 'tests/' || true)

          REPORT+="\n### ЁЯзк Test coverage\n"
          if [ "$SRC_CHANGED" -gt 0 ] && [ "$TESTS_CHANGED" -eq 0 ]; then
            REPORT+="- тЪая╕П Source files changed but **no tests added**. Please add tests.\n"
          elif [ "$SRC_CHANGED" -gt 0 ] && [ "$TESTS_CHANGED" -gt 0 ]; then
            REPORT+="- тЬЕ Source files changed and tests were added/updated.\n"
          elif [ "$TESTS_CHANGED" -gt 0 ]; then
            REPORT+="- тЬЕ Test-only changes.\n"
          else
            REPORT+="- тД╣я╕П No source code changes to test.\n"
          fi

          # 5. PR size
          STAT=$(git diff --shortstat origin/main...HEAD)
          REPORT+="\n### ЁЯУП Size\n\`${STAT}\`\n"

          ADDITIONS=$(git diff --stat origin/main...HEAD | tail -1 | awk '{print $4}')
          DELETIONS=$(git diff --stat origin/main...HEAD | tail -1 | awk '{print $6}')
          TOTAL=$((${ADDITIONS:-0} + ${DELETIONS:-0}))

          if [ "$TOTAL" -gt 1000 ]; then
            REPORT+="\nтЪая╕П This is a large PR. Consider splitting into smaller, focused PRs.\n"
          fi

          # 6. Checklist reminder
          REPORT+="\n### тЬЕ Reviewer checklist\n"
          REPORT+="- [ ] CI is green (build + 218+ tests on Node 18/20/22)\n"
          REPORT+="- [ ] Tests included for new code\n"
          REPORT+="- [ ] No protocol breaking changes\n"
          REPORT+="- [ ] Uses \`transition()\` for status changes (not direct assignment)\n"
          REPORT+="- [ ] Error handling is appropriate (no swallowed errors)\n"

          # Save report
          echo "$REPORT" > /tmp/pr-report.md
          echo "report_file=/tmp/pr-report.md" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/pr-report.md', 'utf8');

            const body = `## ЁЯдЦ Automated PR Review\n\n${report}\n\n---\n*This is an automated review. A human maintainer will review and approve/deny.*`;

            // Find existing bot comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Automated PR Review')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
