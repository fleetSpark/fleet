name: Auto Label PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-label PR
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const files = execSync('git diff --name-only origin/main...HEAD').toString().split('\n').filter(Boolean);

            const labels = new Set();

            for (const file of files) {
              if (file.startsWith('packages/core/src/protocol/') || file.startsWith('packages/core/src/state/')) {
                labels.add('protocol');
                labels.add('needs-careful-review');
              }
              if (file.startsWith('packages/core/')) labels.add('core');
              if (file.startsWith('packages/cli/')) labels.add('cli');
              if (file.startsWith('packages/adapters/')) labels.add('adapter');
              if (file.startsWith('tests/')) labels.add('tests');
              if (file.endsWith('.md') || file.startsWith('website/')) labels.add('docs');
              if (file.startsWith('.github/')) labels.add('ci/cd');
              if (file.startsWith('packages/cli/src/dashboard/')) labels.add('dashboard');
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labels],
              });
            }
